<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Component Hunt</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Component Hunt</h1>
    <p class="subtitle">Breaking down YouTube's homepage into reusable components</p>

    <div class="container">

        <section>
            <h2>Component Tree</h2>
            <div class="tree" id="tree"></div>
        </section>

        <section>
            <h2>Component Breakdown</h2>
            <div id="components"></div>
        </section>

        <section>
            <h2>Structure Summary</h2>
            <div class="summary-box" id="summary"></div>
        </section>

    </div>

    <script src="script.js"></script>
</body>
</html>
