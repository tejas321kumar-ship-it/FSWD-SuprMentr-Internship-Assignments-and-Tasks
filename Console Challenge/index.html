<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Console Challenge</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Console Challenge</h1>
    <p>
      Open browser console and run calculator functions.
    </p>

    <h2>Examples</h2>
    <ul>
      <li>calc.add(10, 5)</li>
      <li>calc.subtract(20, 7)</li>
      <li>calc.multiply(4, 6)</li>
      <li>calc.divide(30, 3)</li>
      <li>calc.percentage(50, 200)</li>
      <li>calc.showHistory()</li>
    </ul>

    <p class="note">Check the console output after each command.</p>
  </div>

  <script src="script.js"></script>
</body>
