<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Registration Form</h1>

        <form id="regForm" novalidate>
            <div class="field">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="Enter your full name">
                <span class="error-msg" id="nameError"></span>
            </div>

            <div class="field">
                <label for="email">Email</label>
                <input type="text" id="email" placeholder="Enter your email">
                <span class="error-msg" id="emailError"></span>
            </div>

            <div class="field">
                <label for="phone">Phone Number</label>
                <input type="text" id="phone" placeholder="Enter 10-digit phone number">
                <span class="error-msg" id="phoneError"></span>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Min 6 characters">
                <span class="error-msg" id="passwordError"></span>
            </div>

            <div class="field">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Re-enter password">
                <span class="error-msg" id="confirmPasswordError"></span>
            </div>

            <div class="field">
                <label for="age">Age</label>
                <input type="text" id="age" placeholder="Enter your age">
                <span class="error-msg" id="ageError"></span>
            </div>

            <button type="submit">Register</button>
        </form>

        <div class="success-msg" id="successMsg">
            Registration successful! Welcome aboard.
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
